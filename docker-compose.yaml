version: '3.8'
services:
  rws:
    build:
      context: .
      dockerfile: Dockerfile
    image: robotics-web-simulator:latest
    # Do not bind container port to host to avoid "port already allocated" errors on shared hosts.
    # Use expose so the service is reachable within the Docker network (Coolify will handle external routing).
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ | grep -q 'Hello, World' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  rws_emsdk:
    profiles: [emsdk]
    build:
      context: .
      dockerfile: Dockerfile.emsdk
    image: robotics-web-simulator:emsdk
    # emsdk profile also exposes the container port only (no host binding)
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ | grep -q 'Hello, World' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

# Usage:
#  - 默认编译并运行普通镜像： docker compose up --build
#  - 使用 emscripten 构建（体积较大）： docker compose --profile emsdk up --build
