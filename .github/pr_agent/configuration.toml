[pr_reviewer]
# 工程实践4 - 软件工程实验课 PR Review 核心规则
model = "gpt-5-mini"
max_tokens = 3000
# 【关键参数】Review严格度控制（核心调整项）
# 规则：值越低越严格，0.1为最严格（实验课默认强制最严校验）
# 调整场景：
# - 若学生反馈审核过于严苛，可上调至0.3（仍保持严格但放宽非核心细节）
# - 若仅需快速筛查重大问题，可上调至0.5（中等严格度）
temperature = 0.1
# 强制检查维度（覆盖学生PR常见问题）
reviewer_prompts = [
    "### 1. 代码规范性（工程实践4核心要求）\n- 检查代码是否符合PEP8（Python）/ESLint（前端）规范\n- 变量/函数命名是否遵循“见名知意”原则，禁止拼音/无意义命名\n- 注释是否覆盖核心逻辑（实验要求：关键函数必须有功能说明、入参/出参注释）\n- 是否存在硬编码（如魔法数字、固定路径，需抽为常量）",
    "### 2. 功能完整性（实验任务验证）\n- PR实现的功能是否完全匹配实验指导书要求\n- 核心功能是否有边界测试（如空输入、异常场景处理）\n- 前端交互是否符合实验UI原型，后端接口是否返回规范格式数据",
    "### 3. 工程化实践要求\n- 是否包含单元测试（实验要求：核心功能测试覆盖率≥80%）\n- Git提交记录是否规范（提交信息需包含：实验模块+修改内容，如\"工程实践4：完善碰撞检测功能\"）\n- 依赖管理是否清晰（requirements.txt/package.json是否无冗余依赖）",
    "### 4. 错误处理与鲁棒性\n- 是否存在未捕获的异常（如网络请求、文件读写未做try-catch）\n- 输入参数是否做合法性校验（如学生常忽略的参数类型/范围检查）\n- 日志是否覆盖关键操作（实验要求：需记录功能执行流程+异常信息）",
    "### 5. 性能与资源管理\n- 是否存在内存泄漏（如未关闭文件句柄、未释放前端监听事件）\n- 循环/递归是否有终止条件（禁止无限循环）\n- 前端渲染是否存在冗余请求（如重复调用接口）",
    "### 6. 实验文档完整性\n- PR描述是否包含：实验任务编号、实现思路、测试步骤\n- 是否附带功能演示截图/录屏（实验提交要求）\n- 若修改了已有功能，是否说明修改原因及影响范围"
]
# 输出格式要求（便于学生理解整改方向）
output_format = """
## 工程实践4 - PR Review 结果（{repo_name}）
### 🔍 检查维度：{review_section}
### ✅ 符合要求项：
{positive_points}
### ❌ 需整改项（附修改建议）：
{negative_points}
### 📚 工程实践知识点提醒：
{suggestions}
"""
# 通用配置
[github]
# 使用 GitHub Secrets 来提供 token，切勿将真实 token 写入仓库
access_token = "${{ secrets.GITHUB_TOKEN }}"
[openai]
model = "GPT-5-mini"
api_key = "${{ secrets.COPILOT_API_KEY }}"  # 可选：若Copilot需单独API Key
