name: 工程实践4 - PR Agent 自动Review
on:
  pull_request:
    types: [opened, reopened, synchronize]
  pull_request_review_comment:
    types: [created]

jobs:
  pr_agent_review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      checks: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install PR-Agent
        run: |
          pip install pr-agent==0.10.4  # 固定版本，避免兼容性问题

      - name: 加载课程专属配置
        run: |
          echo "加载工程实践4 Review规则..."
          cat .github/pr_agent/configuration.toml

      - name: Run PR Agent Review（工程实践4定制版）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CUSTOM_GITHUB_TOKEN: 
          PR_AGENT_CONFIG_PATH: .github/pr_agent/configuration.toml
        run: |
          pr-agent review --pr_url ${{ github.event.pull_request.html_url }}

      - name: 输出Review日志（便于调试）
        if: always()
        run: |
          echo "PR-Agent执行日志："
          cat ~/.pr_agent/logs/pr_agent.log || echo "日志文件未生成"
