name: 工程实践4 - PR Agent 自动Review
on:
  pull_request:
    types: [opened, reopened, synchronize]
  pull_request_review_comment:
    types: [created]

jobs:
  pr_agent_review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      checks: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Diagnostic info
        run: |
          echo "=== ENV ==="
          env || true
          echo "=== Python ==="
          python -V || true
          echo "=== Pip list ==="
          pip --version || true
          pip list || true

      - name: Install PR-Agent (debug)
        run: |
          pip install pr-agent==0.2.4 || pip install pr-agent
          echo "pr-agent version:"
          pr-agent --version || true

      - name: 加载课程专属配置
        run: |
          echo "加载工程实践4 Review规则..."
          echo '--- configuration start ---'
          sed -n '1,200p' .github/pr_agent/configuration.toml || true
          echo '--- configuration end ---'

      - name: Run PR Agent Review（工程实践4定制版）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 若需在 workflow 中使用自定义 token，请在仓库 Secrets 中添加 GITHUB_PAT
          CUSTOM_GITHUB_TOKEN: ${{ secrets.GITHUB_PAT }}
          PR_AGENT_CONFIG_PATH: .github/pr_agent/configuration.toml
        run: |
          set -x
          pr-agent review --pr_url ${{ github.event.pull_request.html_url }} || true

      - name: 输出PR-Agent输出与日志（便于调试）
        if: always()
        run: |
          echo "=== pr-agent ps aux ==="
          ps aux | head -n 50 || true
          echo "=== pr-agent logs dir ==="
          ls -la ~/.pr_agent || true
          echo "=== pr-agent log files ==="
          ls -la ~/.pr_agent/logs || true
          echo "=== pr-agent main log ==="
          if [ -f ~/.pr_agent/logs/pr_agent.log ]; then
            tail -n 200 ~/.pr_agent/logs/pr_agent.log
          else
            echo "No pr_agent.log found"
          fi
