version: '3.8'
services:
  rws:
    build:
      context: .
      dockerfile: Dockerfile
    image: robotics-web-simulator:latest
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ | grep -q 'Hello, World' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  rws_emsdk:
    profiles: [emsdk]
    build:
      context: .
      dockerfile: Dockerfile.emsdk
    image: robotics-web-simulator:emsdk
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ | grep -q 'Hello, World' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

# Usage:
#  - 默认编译并运行普通镜像： docker compose up --build
#  - 使用 emscripten 构建（体积较大）： docker compose --profile emsdk up --build
